<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>InRange - Login</title>
    <link rel="stylesheet" href="/css/login.css">
    <!-- Boxicons for icons -->
    <link href="https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css" rel="stylesheet">

    <!-- Inline styles for logo positioning -->
    <style>
        .form-box {
            /* Ensure the form box is the positioning context for the absolute logo */
            position: relative; 
        }

        /* NEW: Logo Styling */
        .form-box .logo {
            position: absolute;
            top: 20px; 
            left: 20px; 
            width: 50px; 
            height: auto;
            z-index: 10; 
        }

        .form-box.login h2 {
            /* Adjusted margin to clear the space for the logo */
            margin-top: 50px; 
            text-align: center;
        }

        /* Assuming the rest of the styling is in /css/login.css */
    </style>
</head>
<body>
    <div class="container">
        <!-- Left box: Login form -->
        <div class="form-box login">
            <img src="/images/blogo.png" alt="InRange Logo" class="logo">
            <h2>Sign In</h2>
            <div id="form-message" class="form-message" style="display:none;"></div>
            <form action="http://localhost:3000/auth/login" method="POST">
                <div class="input-box">
                    <i class='bx bx-user'></i>
                    <input type="email" name="email" placeholder=" " required>
                    <label>Email</label>
                </div>
                <div class="input-box">
                    <i class='bx bx-lock-alt'></i>
                    <input type="password" name="password" placeholder=" " required>
                    <label>Password</label>
                </div>
                <div class="options">
                    <a href="#">Forgot your password?</a>
                </div>
                <button type="submit" class="btn">Sign In</button>
            </form>
            <script>
                (function () {
                    var params = new URLSearchParams(window.location.search);
                    var error = params.get('error');
                    var success = params.get('success');
                    var msgEl = document.getElementById('form-message');
                    var messages = {
                        invalid: 'Invalid email or password.',
                        missing: 'Please enter both email and password.',
                        server: 'Something went wrong. Please try again.'
                    };
                    if (error && messages[error]) {
                        msgEl.textContent = messages[error];
                        msgEl.classList.add('error');
                        msgEl.style.display = 'block';
                    } else if (success === 'registered') {
                        msgEl.textContent = 'Account created. Please sign in.';
                        msgEl.classList.add('success');
                        msgEl.style.display = 'block';
                    }
                })();
            </script>
        </div>

        <!-- Right box: Welcome message -->
        <div class="form-box register">
            <h2>Hello, Friend!</h2>
            <p>Register with your personal details to use all features of InRange.</p>
            <a href="/signup.html" class="btn">Sign Up</a>
        </div>
    </div>
</body>
</html>
