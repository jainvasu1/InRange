<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>InRange - Profile View</title>
    <link href="https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css" rel="stylesheet">
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: Arial, sans-serif;
            background: #0F172A;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            position: relative;
        }

        body::before {
            content: "";
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: linear-gradient(to right, rgba(255,255,255,0.2) 1px, transparent 1px),
                             linear-gradient(to bottom, rgba(255,255,255,0.2) 1px, transparent 1px);
            background-size: 80px 80px;
            z-index: 0;
        }

        /* --- BACK ICON STYLES --- */
        .back-icon {
            position: absolute;
            top: 30px;
            right: 40px;
            width: 50px;
            height: 50px;
            background: white;
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.2);
            z-index: 1000; 
            text-decoration: none;
            transition: transform 0.2s ease, box-shadow 0.2s ease;
        }

        .back-icon i {
            font-size: 28px;
            color: #0F172A;
        }

        .back-icon:hover {
            transform: scale(1.1);
            box-shadow: 0 6px 20px rgba(0, 0, 0, 0.3);
        }

        /* --- CONTAINER (THE MAIN BOX) --- */
        .container {
            width: 90%;
            max-width: 1200px;
            display: flex;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.4);
            background: rgb(236, 236, 198);
            position: relative;
            z-index: 1;
            
            /* NEW: ROUNDED CORNERS */
            border-radius: 20px; 
            overflow: hidden; /* This makes sure the pink side doesn't stick out */
        }

        .header {
            position: absolute;
            top: 0;
            left: 35%;
            width: 65%;
            padding: 20px 50px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            z-index: 10;
        }

        .header-logo {
            width: 40px;
            height: auto;
        }

        .header span {
            color: #0F172A;
            font-size: 22px;
            font-weight: bold;
        }

        .left-section {
            width: 35%;
            background: #0F172A;
            padding: 15px;
            display: flex;
            align-items: stretch; /* Stretch to fill vertical height */
            justify-content: center;
            overflow: hidden;
        }

        /* --- PROFILE PIC STYLES --- */
        .profile-pic {
            width: 100%;       
            height: 100%;     
            border-radius: 12px; 
            object-fit: cover; 
            border: 4px solid #0F172A;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.2);
            transition: transform 0.3s ease;
            cursor: pointer;
        }

        .profile-pic:hover {
            transform: scale(1.1);
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.3);
        }

        .right-section {
            width: 65%;
            padding: 100px 50px 40px;
        }

        h1 { font-size: 40px; font-weight: 900; }
        p { margin: 10px 0; font-size: 16px; color: #444; }
    </style>
</head>

<body>

    <a href="dashboard.html" class="back-icon" title="Back to Dashboard">
        <i class='bx bx-arrow-back'></i>
    </a>

<div class="container">

    <div class="header">
        <img src="/images/blogo.png" alt="InRange Logo" class="header-logo">
        <span>Its meeee</span>
    </div>

    <aside class="left-section">
        <img id="profileImg" class="profile-pic" src="/images/blogo.png" alt="Profile Photo"
             onerror="this.onerror=null;this.src='/images/blogo.png';">
    </aside>

    <section class="right-section">
        <h1 id="fullName">Loading...</h1>
        <p><strong>Gender:</strong> <span id="gender"></span></p>
        <p><strong>Course:</strong> <span id="course"></span></p>
        <p><strong>Address:</strong> <span id="address"></span></p>
        <p><strong>Contact:</strong> <span id="contact"></span></p>
        <p><strong>Socials:</strong> <span id="socials"></span></p>
        <p><strong>Bio:</strong><br><span id="bio"></span></p>
        <div style="width: 400px; height: 400px; margin-top:20px;">
            <canvas id="radarChart"></canvas>
        </div>
    </section>

</div>


<script>
console.log("Script loaded");
function getScore(value, type) {
    if (!value) return 50;

    value = value.toLowerCase();

    const maps = {
        cleanliness: {
            "very clean": 90,
            "moderate": 60,
            "messy": 30
        },
        sleep: {
            "early sleeper": 90,
            "flexible": 70,
            "night owl": 40
        },
        food: {
            "vegetarian": 70,
            "non-vegetarian": 80,
            "vegan": 85
        },
        location: {
            "near campus": 90,
            "city center": 70,
            "suburbs": 50
        },
        budget: {
            "low": 40,
            "medium": 70,
            "high": 90
        }
    };

    return maps[type]?.[value] || 50;
}

function renderRadar(data) {

    console.log("Radar data:", data);

    const canvas = document.getElementById("radarChart");

    if (!canvas) {
        console.error("Canvas not found");
        return;
    }

    const ctx = canvas.getContext("2d");

    const scores = [
        getScore(data.cleanliness, "cleanliness"),
        getScore(data.sleepSchedule, "sleep"),
        getScore(data.foodPreference, "food"),
        getScore(data.locationPreference, "location"),
        getScore(data.budget, "budget")
    ];

    console.log("Scores:", scores);

    if (window.radarChartInstance) {
        window.radarChartInstance.destroy();
    }

    window.radarChartInstance = new Chart(ctx, {
        type: 'radar',
        data: {
            labels: ['Cleanliness', 'Sleep', 'Food', 'Location', 'Budget'],
            datasets: [
                {   label: 'You',
                    data: scores,
                    backgroundColor: 'rgba(110, 231, 183, 0.3)',
                    borderColor: '#6EE7B7',
                    pointBackgroundColor: '#34D399',
                    fill: true,
                    tension: 0.3
                }]},
        options: {
            responsive: true,
            maintainAspectRatio: false,
            animation: {
                duration: 1500
            },
            scales: {
                r: {
                    beginAtZero: true,
                    max: 100,
                    grid: {
                        color: "rgba(0,0,0,0.1)"
                    },
                    angleLines: {
                        color: "rgba(0,0,0,0.1)"
                    },
                    pointLabels: {
                        color: "#0F172A"
                    }}}
                }
    });
}

function renderProfile(data) {

    console.log("PROFILE DATA:", data); // 🔥 debug

    document.getElementById('fullName').textContent = data.fullName || 'N/A';
    document.getElementById('gender').textContent = data.gender || 'N/A';
    document.getElementById('course').textContent = data.course || 'N/A';

    document.getElementById('address').textContent = data.permanentAddress || 'N/A';

    // Mask contact
    const contactNumber = String(data.contactNumber || 'N/A');
    document.getElementById('contact').textContent =
        contactNumber.length > 3 ? `XXXXXXX${contactNumber.slice(-3)}` : contactNumber;

    // Social links
    let socials = [];
    if (data.socialLinks) {
        if (data.socialLinks.instagram) socials.push(`Instagram: ${data.socialLinks.instagram}`);
        if (data.socialLinks.linkedin) socials.push(`LinkedIn: ${data.socialLinks.linkedin}`);
    }
    document.getElementById('socials').textContent = socials.join(" | ") || "N/A";

    document.getElementById('bio').textContent = data.bio || 'N/A';

    // ✅ IMAGE FROM FOLDER (NOT BASE64)
    const img = document.getElementById('profileImg');
    if (data.profilePicture) {
        img.src = data.profilePicture;
    } else {
        img.src = "/images/blogo.png";
    }}

// ✅ FETCH WITH TOKEN (VERY IMPORTANT)
fetch('/api/profile/me', {
    headers: {
        Authorization: `Bearer ${localStorage.getItem("token")}`
    }
})
.then(res => res.json())
.then(data => {
    console.log("FETCH WORKED"); // 🔥 ADD THIS
    console.log("PROFILE:", data);

    renderProfile(data);

    console.log("Calling radar..."); // 🔥 ADD THIS
    renderRadar(data);
})
.catch(err => console.error(err));

</script>

</body>
</html>
